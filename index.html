<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Waypoints</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <!-- Leaflet.markercluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- Type: humanist serif with cartographic pedigree -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Map surface -->
  <div id="map" aria-label="Waypoints map"></div>

  <!-- Paper-grain + vignette overlays (the analog answer to CRT scanlines) -->
  <div class="paper-grain" aria-hidden="true"></div>
  <div class="map-vignette" aria-hidden="true"></div>

  <!-- Masthead -->
  <header class="masthead">
    <h1>Waypoints</h1>
    <p class="masthead__sub">A gathering of places — Great Britain</p>
  </header>

  <!-- Region selector (segmented control) -->
  <nav class="region-control" id="region-control" aria-label="Region presets"></nav>

  <!-- Lower-left stack: Add button above the legend -->
  <div class="lower-left">
    <button class="add-waypoint" id="add-waypoint" type="button"
            aria-label="Add new waypoint" title="Add new waypoint">
      <svg class="aw-frame" viewBox="0 0 100 100" aria-hidden="true">
        <path class="aw-corners" d="M4 26 V4 H26 M74 4 H96 V26 M96 74 V96 H74 M26 96 H4 V74" />
        <path class="aw-plus" d="M50 26 V50 M38 38 H62" />
      </svg>
      <span class="aw-label">Add waypoint</span>
    </button>
    <!-- Legend / filter cartouche -->
    <aside class="legend" id="legend" aria-label="Key and filters"></aside>
  </div>

  <!-- Side panel (desktop drawer / mobile bottom sheet) -->
  <section class="panel" id="panel" aria-hidden="true" aria-label="Place details" tabindex="-1">
    <div class="panel__handle" aria-hidden="true"></div>
    <button class="panel__close" id="panel-close" aria-label="Close panel">&times;</button>
    <div class="panel__body" id="panel-body"></div>
  </section>
  <div class="panel__backdrop" id="panel-backdrop" hidden></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Add-waypoint modal -->
  <div class="aw-modal-backdrop" id="aw-backdrop" hidden></div>
  <div class="aw-modal" id="aw-modal" role="dialog" aria-modal="true" aria-labelledby="aw-title" hidden>
    <button class="aw-close" id="aw-close" type="button" aria-label="Close">&times;</button>

    <!-- Step 1: input -->
    <div class="aw-step" id="aw-input-step">
      <h2 class="aw-h" id="aw-title">Add a waypoint</h2>
      <p class="aw-sub">Drop an image, paste a link, or just describe a place. Claude fills in the rest.</p>

      <div class="aw-drop" id="aw-drop" tabindex="0" role="button" aria-label="Upload or drop an image">
        <input type="file" id="aw-file" accept="image/*" hidden>
        <div class="aw-drop-inner" id="aw-drop-inner">
          <span class="aw-drop-icon">⤓</span>
          <span class="aw-drop-text">Drop an image here, or click to upload</span>
        </div>
      </div>

      <div class="aw-or"><span>or</span></div>

      <textarea id="aw-text" class="aw-text" rows="3"
        placeholder="Paste a link, or describe a place — e.g. “Ian Curtis’s grave, Macclesfield”"></textarea>

      <input type="password" id="aw-key" class="aw-key" placeholder="Access key" autocomplete="off">

      <div class="aw-actions">
        <button class="aw-btn aw-btn--ghost" id="aw-cancel" type="button">Cancel</button>
        <button class="aw-btn aw-btn--primary" id="aw-draft" type="button">Draft it →</button>
      </div>
      <p class="aw-status" id="aw-status" aria-live="polite"></p>
    </div>

    <!-- Step 2: preview -->
    <div class="aw-step" id="aw-preview-step" hidden>
      <h2 class="aw-h">Look right?</h2>
      <div class="aw-preview" id="aw-preview"></div>
      <div class="aw-actions">
        <button class="aw-btn aw-btn--ghost" id="aw-back" type="button">← Back</button>
        <button class="aw-btn aw-btn--primary" id="aw-commit" type="button">Add to map</button>
      </div>
      <p class="aw-status" id="aw-status2" aria-live="polite"></p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/app.js"></script>
  <script src="js/add.js"></script>
</body>
</html>
